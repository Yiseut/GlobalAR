<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>下一批用户确认清单</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #28231f;
      --muted: #776d64;
      --line: #e6ded6;
      --bg: #fbfaf8;
      --panel: #ffffff;
      --accent: #c75f42;
      --soft: #f6eee9;
      --green: #2d7567;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, "Microsoft YaHei", sans-serif;
      color: var(--ink);
      background: var(--bg);
      line-height: 1.55;
    }
    header {
      padding: 28px 32px 18px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    h1 { margin: 0 0 8px; font-size: 26px; }
    .meta { color: var(--muted); display: flex; flex-wrap: wrap; gap: 14px; }
    main { padding: 24px 32px 40px; max-width: 1320px; margin: 0 auto; }
    .how {
      background: var(--soft);
      border: 1px solid var(--line);
      padding: 14px 16px;
      margin-bottom: 22px;
    }
    section { margin: 0 0 28px; }
    h2 {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 0 0 6px;
      font-size: 21px;
    }
    h2 span {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 30px;
      height: 24px;
      padding: 0 8px;
      color: #fff;
      background: var(--accent);
      border-radius: 999px;
      font-size: 13px;
    }
    .instruction { margin: 0 0 12px; color: var(--muted); }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 12px;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
    }
    .card-head { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .id { font-weight: 700; color: var(--accent); }
    .badge { color: #fff; background: var(--green); padding: 2px 7px; border-radius: 999px; font-size: 12px; }
    .score { color: var(--muted); font-size: 12px; }
    h3 { margin: 0; font-size: 17px; }
    .product { margin: 4px 0 10px; color: var(--muted); }
    dl { display: grid; grid-template-columns: 72px 1fr; gap: 7px 10px; margin: 0; }
    dt { color: var(--muted); }
    dd { margin: 0; min-width: 0; overflow-wrap: anywhere; }
    a { color: #9c412d; }
    .muted { color: var(--muted); }
    @media (max-width: 640px) {
      header, main { padding-left: 16px; padding-right: 16px; }
      .cards { grid-template-columns: 1fr; }
      dl { grid-template-columns: 1fr; }
      dt { font-weight: 700; }
    }
  </style>
</head>
<body>
  <header>
    <h1>下一批用户确认清单</h1>
    <div class="meta">
      <span>生成时间：2026-06-01T14:43:02+08:00</span>
      <span>合并去重后：0 条</span>
      <span>P0/P1：0 条</span>
      <span>韩国 P1：0 条</span>
    </div>
  </header>
  <main>
    <div class="how">
      回复时直接写编号即可，例如：<strong>NEXT-001 确认保留，补 FDA/CE；NEXT-002 排除；NEXT-003 先查证。</strong>
      每条都保留了原始公司、品牌、产品名和系统当前缺口，方便你判断“看的是什么”。
    </div>
    
  </main>
</body>
</html>
